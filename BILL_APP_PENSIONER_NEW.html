async function newBill(){
  currentBillId = null;
  billNo.value='...';
  try{
    const res = await fetch(`${API_BASE}/api/next-bill-no`, {method:'POST'});
    const data = await res.json();
    billNo.value = data.billNo;
  }catch(err){
    alert('Could not reach server for new bill number. Check your internet connection.\n'+err);
    billNo.value='';
  }
  billDate.valueAsDate=new Date();tbody.innerHTML='';rows=0;addRow();grand.textContent='0.00';
  pName.value='';pAge.value='';pPhone.value='';
}

function addRow(){

  rows++;

  let pOpts=procedures.map(p=>`<option value='${p.code}'>${p.name}</option>`).join('');
  let cOpts=procedures.map(p=>`<option value='${p.code}'>${p.code}</option>`).join('');

  let tr=document.createElement('tr');

  tr.innerHTML=`
<td>${rows}</td>

<td>
<select id='code${rows}' onchange='setProc(${rows})'>
<option></option>${cOpts}
</select>
</td>

<td>
<select id='proc${rows}' onchange='setCode(${rows})'>
<option></option>${pOpts}
</select>
</td>

<td><input id='rate${rows}' style='width:80px'></td>

<td>
<input id='qty${rows}' value='1' style='width:60px' oninput='calcAll()'>
</td>

<td>
<input id='total${rows}' readonly style='width:80px'>
</td>

<td>
<button onclick='deleteRow(this)'>❌</button>
</td>
`;

  tbody.appendChild(tr);
}


function deleteRow(btn){

  if(!confirm("Ye row delete karni hai?")) return;

  let row = btn.closest("tr");
  row.remove();

  let allRows=document.querySelectorAll("#tbody tr");

  rows=0;
  allRows.forEach((r,i)=>{
    r.cells[0].textContent=i+1;
    rows=i+1;
  });

  calcAll();
}
function setProc(r){let code=document.getElementById('code'+r).value;let p=procedures.find(x=>x.code===code);if(p){document.getElementById('proc'+r).value=code;document.getElementById('rate'+r).value=p.rate;}calcAll();}
function setCode(r){let code=document.getElementById('proc'+r).value;let p=procedures.find(x=>x.code===code);if(p){document.getElementById('code'+r).value=code;document.getElementById('rate'+r).value=p.rate;}calcAll();}
async function deleteBill(){
  if(!currentBillId){
    alert("Pehle bill select karo");
    return;
  }

  if(!confirm("Bill permanently delete karna hai?")) return;

  try{
    const res = await fetch(`${API_BASE}/api/bills/${encodeURIComponent(currentBillId)}`, {method:'DELETE'});
    if(!res.ok) throw new Error('Server error '+res.status);
    newBill();
    alert("Bill Deleted ✔️");
  }catch(err){
    alert('Delete failed: '+err);
  }
}
function calcAll(){let g=0;for(let i=1;i<=rows;i++){let rate=parseFloat(document.getElementById(`rate${i}`)?.value)||0;let qty=parseFloat(document.getElementById(`qty${i}`)?.value)||0;let t=rate*qty;if(document.getElementById(`total${i}`))document.getElementById(`total${i}`).value=t.toFixed(2);g+=t;}grand.textContent=g.toFixed(2);}
async function saveBill(){
  calcAll();

  if(!billNo.value || billNo.value==='...'){
    alert('Bill number not ready yet. Please wait a moment and try again.');
    return;
  }
  if(!pName.value.trim()){
    alert('Please enter patient name.');
    return;
  }

  let bill={
    no: billNo.value,
    date: billDate.value,
    name: pName.value,
    age: pAge.value,
    sex: pSex.value,
    phone: pPhone.value,
    lines:[],
    total:grand.textContent
  };

  for(let i=1;i<=rows;i++){
    let code=document.getElementById(`code${i}`)?.value;
    if(!code)continue;
    bill.lines.push({
      code,
      rate:document.getElementById(`rate${i}`).value,
      qty:document.getElementById(`qty${i}`).value,
      total:document.getElementById(`total${i}`).value
    });
  }

  const wasUpdate = !!currentBillId;

  try{
    const res = await fetch(`${API_BASE}/api/bills`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(bill)
    });
    if(!res.ok) throw new Error('Server responded '+res.status);
    currentBillId = bill.no;
    alert(wasUpdate ? "Bill Updated \u2714" : "Bill Saved \u2714");
  }catch(err){
    alert('Save failed. Check your internet connection and try again.\n'+err);
  }
}
async function toggleRegister(){
  let reg=document.getElementById('register');
  if(reg.style.display==='block'){reg.style.display='none';return;}
  reg.innerHTML='<p>Loading...</p>';reg.style.display='block';
  try{
    const res = await fetch(`${API_BASE}/api/bills`);
    const all = await res.json();
    if(!all.length){reg.innerHTML='<p>No bills saved</p>';return;}
    let html='<h3>Saved Bills</h3><ul>';
    all.forEach(b=>html+=`<li><a href='#' onclick="loadBill('${b.no}')">${b.no} - ${b.name} (Rs.${b.total})</a></li>`);
    html+='</ul>';
    reg.innerHTML=html;
  }catch(err){
    reg.innerHTML='<p>Could not load bills. Check connection.</p>';
  }
}
async function loadBill(no){
  try{
    const res = await fetch(`${API_BASE}/api/bills/${encodeURIComponent(no)}`);
    if(!res.ok) throw new Error('Bill not found');
    const b = await res.json();
    currentBillId = no;billNo.value=b.no;billDate.value=b.date;pName.value=b.name;pAge.value=b.age;pSex.value=b.sex;pPhone.value=b.phone;tbody.innerHTML='';rows=0;
    b.lines.forEach(l=>{addRow();let r=rows;document.getElementById('code'+r).value=l.code;document.getElementById('proc'+r).value=l.code;document.getElementById('rate'+r).value=l.rate;document.getElementById('qty'+r).value=l.qty;});
    calcAll();
    document.getElementById('register').style.display='none';
  }catch(err){
    alert('Could not load bill: '+err);
  }
}
async function exportJSON(){
  try{
    const res = await fetch(`${API_BASE}/api/bills/export-all`);
    const data = await res.json();
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);let a=document.createElement('a');a.href=url;a.download='JKH_Pensioner_Backup.json';a.click();URL.revokeObjectURL(url);
  }catch(err){
    alert('Backup failed: '+err);
  }
}
function importJSON(file){
  if(!file){alert('Select a file first');return;}
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      const data=JSON.parse(e.target.result);
      const bills = data.bills || [];
      if(!confirm(`Import ${bills.length} bills to the server? This will overwrite bills with the same number.`)) return;
      const res = await fetch(`${API_BASE}/api/bills/import-all`, {
        method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({bills})
      });
      if(!res.ok) throw new Error('Server error');
      alert('Data Imported OK');
      location.reload();
    }catch(err){alert('Invalid file or import failed: '+err);}
  };
  reader.readAsText(file);
}
async function exportExcel(){
  try{
    const res = await fetch(`${API_BASE}/api/bills`);
    const bills = await res.json();
    if(!bills.length){alert('No bills to export');return;}
    let csv='Bill No,Date,Patient,Total\n';
    bills.forEach(b=>csv+=`${b.no},${b.date},${b.name},${b.total}\n`);
    const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);let a=document.createElement('a');a.href=url;a.download='Bills.csv';a.click();URL.revokeObjectURL(url);
  }catch(err){
    alert('Export failed: '+err);
  }
}
